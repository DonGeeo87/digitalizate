# ------------------------------------------------------------
# digitalizate-api.codigoguerrero.dev
# ------------------------------------------------------------
server {
  set $forward_scheme http;
  set $server         "digitalizate-api";
  set $port           3031;

  listen 80;
  listen [::]:80;

  server_name digitalizate-api.codigoguerrero.dev;
  include conf.d/include/letsencrypt-acme-challenge.conf;
  include conf.d/include/block-exploits.conf;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $http_connection;
  proxy_http_version 1.1;
  access_log /data/logs/proxy-host-53_access.log proxy;
  error_log /data/logs/proxy-host-53_error.log warn;
  location / { include conf.d/include/proxy.conf; }
}
